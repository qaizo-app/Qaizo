<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qaizo — Page Not Found</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0a0e1a; color:#cbd5e1; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px 20px; }
        .wrap { max-width:400px; }
        .code { font-size:120px; font-weight:800; color:#151c2f; line-height:1; }
        .title { font-size:24px; font-weight:700; color:#f1f5f9; margin:16px 0 8px; }
        .desc { color:#64748b; font-size:15px; margin-bottom:32px; }
        a { display:inline-flex; align-items:center; gap:8px; padding:12px 28px; background:#34d399; color:#0a0e1a; font-weight:600; font-size:15px; border-radius:12px; text-decoration:none; transition:all 0.3s; }
        a:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(52,211,153,0.3); }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">404</div>
        <div class="title">Page not found</div>
        <p class="desc">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/">← Back to Qaizo</a>
    </div>
</body>
</html>
